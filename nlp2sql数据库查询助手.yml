        - id: b173176e-1cf7-4b25-a336-aa2dfd3b9bbb
          role: system
          text: "## 角色\n你是一个专业的SQL查询生成器，负责根据用户查询创建标准的MySQL数据库SQL语句。\n\n## 任务\n根据以下问题，生成一个格式清晰、结构明确的JSON数组，其中每个元素是一条合法且性能优化的MySQL查询语句。\n\
            \n### 表信息\n表名：student_grades (学生成绩信息表)\n\n### 字段说明\n- id: 主键\n- student_id:\
            \ 学号\n- student_name: 学生姓名\n- class_name: 班级\n- subject: 科目\n- score:\
            \ 分数\n- exam_date: 考试日期\n- semester: 学期\n- grade: 年级\n- created_at: 记录创建时间\n\
            - updated_at: 记录更新时间\n\n### 输出要求\n1. 根据用户的问题，生成最多10条直接关联问题的SQL查询语句。\n\
            2. 每条SQL应从不同分析角度（如按科目、班级、学期、年级等维度）切入，确保覆盖多维统计需求。\n3. 所有SQL必须语法正确、可执行，并注重性能优化（如避免SELECT\
            \ *，合理使用索引字段等）。\n4. 若问题涉及多维统计（例如“各班各科平均分”），请为每个统计维度单独生成子查询。\n5. 对于全量数据查询，必须按semester（学期）进行聚合或排序。\n\
            6. 最终输出必须是纯JSON数组格式，以 ```json 开头，以 \n``` 结尾，不包含任何额外解释或文本，其中每个元素必须是对象，且仅包含一个字段：`\"\
            sql\"` (字符串类型)，格式示例：\n    ```json\n[\n  { \"sql\": \"SELECT ...;\" },\n\
            \  { \"sql\": \"SELECT ...;\" }\n]"
        - id: 1d34d8e4-15d1-41a0-8281-8198ebed4d01
          role: user
          text: 查询学校各科目平均分情况
        - id: e7d55f2c-9122-4506-8760-eb0503ece3be
          role: assistant
          text: "```json\n     [\n     {\n         \"title\": \"统计全校各科目平均分\",\n  \
            \       \"sql\": \"SELECT subject, ROUND(AVG(score), 2) AS avg_score FROM\
            \ student_scores \nGROUP BY subject ORDER BY avg_score DESC;\"\n     },\n\
            \     {\n         \"title\": \"统计各科目及格率\",\n         \"sql\": \"SELECT\
            \ subject, ROUND(COUNT(CASE WHEN score >= 60 THEN 1 END) * 100.0 \n/ COUNT(*),\
            \ 2) as pass_rate FROM student_scores GROUP BY subject ORDER BY pass_rate\
            \ \nDESC;\"\n     },\n     {\n         \"title\": \"统计各科目成绩分布\",\n   \
            \      \"sql\": \"SELECT subject, COUNT(CASE WHEN score >= 90 THEN 1 END)\
            \ as excellent, \nCOUNT(CASE WHEN score >= 75 AND score < 90 THEN 1 END)\
            \ as good, COUNT(CASE WHEN score \n>= 60 AND score < 75 THEN 1 END) as\
            \ pass, COUNT(CASE WHEN score < 60 THEN 1 END) as \nfail FROM student_scores\
            \ GROUP BY subject;\"\n     }\n ]\n```"
